# Real Machinen validation lane.
#
# Separate from ci.yml on purpose: the main lane stays strict, this lane
# probes whether REAL machinen (@machinen/runtime microVMs — no mocks, no
# process drivers) can run on GitHub-hosted runners, and if it can, runs an
# ENFORCED end-to-end validation of our federation protocol inside a real VM
# (provision -> boot -> /mf calls -> snapshot -> kill -> restore -> counter
# continues).
#
# Runner reality as of 2026-06:
#   - ubuntu-24.04 (x64): /dev/kvm IS available on hosted runners, and
#     machinen 0.4.0 ships @machinen/native-x64-linux — this lane can run
#     real microVMs.
#   - ubuntu-24.04-arm (arm64): hosted runners have NO /dev/kvm (nested
#     virtualization is not exposed on Azure arm64 VMs; see
#     actions/runner-images#14062). This lane reports the hardware audit and
#     exits honestly as "not yet runnable" — it will flip to enforcing
#     automatically if GitHub ever exposes KVM on arm64 runners.
#
# Honesty contract: the job NEVER fakes success. Each leg either
#   (a) runs the real validation and fails the job if validation fails, or
#   (b) declares "machinen not yet runnable: <reason>" in the job summary
#       with machinen_available=false.

name: Machinen

on:
  push:
    branches: [main, machine-federation]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: machinen-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  machinen-e2e:
    name: machinen-e2e (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-arm, ubuntu-24.04]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    outputs:
      machinen_available: ${{ steps.probe.outputs.machinen_available }}
    steps:
      - uses: actions/checkout@v4

      - name: Hardware audit
        id: audit
        run: |
          {
            echo "## Machinen hardware audit (${{ matrix.runner }})"
            echo '```'
            echo "arch:     $(uname -m)"
            echo "kernel:   $(uname -r)"
            echo "cpus:     $(nproc)"
            if [ -e /dev/kvm ]; then
              echo "kvm:      $(ls -l /dev/kvm)"
              if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
                echo "kvm-rw:   yes (usable by $(id -un))"
              else
                echo "kvm-rw:   NO (device present but not read/writable)"
              fi
            else
              echo "kvm:      /dev/kvm ABSENT"
            fi
            if command -v kvm-ok >/dev/null 2>&1; then
              echo "kvm-ok:   $(kvm-ok 2>&1 | tr '\n' '; ')"
            elif [ -e /dev/kvm ]; then
              echo "kvm-ok:   (cpu-checker not installed; /dev/kvm exists)"
            fi
            if command -v criu >/dev/null 2>&1; then
              echo "criu:     $(criu --version 2>&1 | head -1)"
            else
              echo "criu:     not on host PATH (machinen guests ship their own)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -e /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "kvm=true" >> "$GITHUB_OUTPUT"
          else
            echo "kvm=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build the real Node guest (apps/remote)
        run: |
          pnpm --filter @federated-compute/machinen-plugin build
          pnpm --filter remote build
          test -f apps/remote/dist/index.js

      - name: Probe machinen availability
        id: probe
        env:
          KVM_USABLE: ${{ steps.audit.outputs.kvm }}
        run: |
          SCRATCH="$RUNNER_TEMP/machinen-deps"
          mkdir -p "$SCRATCH" && cd "$SCRATCH"
          echo "scratch_dir=$SCRATCH" >> "$GITHUB_OUTPUT"
          npm init -y > /dev/null

          if ! npm install --no-audit --no-fund @machinen/cli @machinen/runtime > npm-install.log 2>&1; then
            tail -20 npm-install.log
            reason="npm install of @machinen/cli + @machinen/runtime failed on $(uname -m) (packages missing for this platform?)"
            echo "machinen_available=false" >> "$GITHUB_OUTPUT"
            echo "- machinen not yet runnable: $reason" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "installed @machinen/cli + @machinen/runtime:"
          npm ls @machinen/cli @machinen/runtime || true

          if [ "$KVM_USABLE" != "true" ]; then
            reason="/dev/kvm is not usable on the ${{ matrix.runner }} hosted runner (nested virtualization not exposed)"
            echo "machinen_available=false" >> "$GITHUB_OUTPUT"
            echo "- machinen not yet runnable: $reason" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! npx machinen install --json > machinen-install.json 2> machinen-install.err; then
            tail -20 machinen-install.err
            reason="machinen install (kernel + base rootfs prefetch) failed"
            echo "machinen_available=false" >> "$GITHUB_OUTPUT"
            echo "- machinen not yet runnable: $reason" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "machinen assets:" && cat machinen-install.json

          echo "machinen_available=true" >> "$GITHUB_OUTPUT"

      - name: Real machinen validation (enforced)
        if: steps.probe.outputs.machinen_available == 'true'
        env:
          MACHINEN_RUNTIME_DIR: ${{ steps.probe.outputs.scratch_dir }}
        run: |
          set +e
          node scripts/machinen-e2e.mjs
          rc=$?
          set -e
          if [ "$rc" -eq 78 ]; then
            # The script discovered at runtime that machinen can't run here
            # (e.g. VMM refused by the hypervisor). Honest skip, not success.
            echo "machinen_available=false (runtime probe)"
            exit 0
          fi
          exit "$rc"

      - name: Honest result
        if: always()
        run: |
          if [ "${{ steps.probe.outputs.machinen_available }}" = "true" ]; then
            echo "machinen was installable and KVM is usable: real validation ran (see step above)."
          else
            echo "machinen_available=false — see job summary for the honest reason. No validation was faked."
          fi
